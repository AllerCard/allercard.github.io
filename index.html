<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AllerCard</title>
    <meta name="description" content="The allergy card the chef actually reads. In every official EU language. Offline. One-time purchase.">
    <style>
        :root {
            color-scheme: light dark;
            --bg: #fafafa;
            --fg: #1a1a1a;
            --muted: #555;
            --accent: #c8102e;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0a0a14;
                --fg: #f0f0f0;
                --muted: #a0a0a0;
                --accent: #ff3050;
            }
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--fg);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
        }
        .container { max-width: 560px; text-align: center; }
        h1 {
            font-size: 56px;
            font-weight: 800;
            letter-spacing: -1.5px;
            margin-bottom: 16px;
        }
        h1 .accent { color: var(--accent); }
        .tagline {
            font-size: 22px;
            color: var(--muted);
            margin-bottom: 12px;
            font-weight: 500;
        }
        .pitch {
            font-size: 16px;
            color: var(--muted);
            margin-bottom: 40px;
            max-width: 480px;
            margin-left: auto;
            margin-right: auto;
        }
        .links {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
            font-size: 15px;
        }
        .links a {
            color: var(--accent);
            text-decoration: none;
            padding: 10px 18px;
            border: 1px solid var(--accent);
            border-radius: 8px;
            transition: background 0.15s;
        }
        .links a:hover { background: rgba(200, 16, 46, 0.1); }
        .footer {
            position: fixed;
            bottom: 24px;
            left: 0;
            right: 0;
            text-align: center;
            color: var(--muted);
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Aller<span class="accent">Card</span></h1>
        <p class="tagline">The card the chef actually reads.</p>
        <p class="pitch">Show your food allergy to any chef, in any official EU language. Allergen names sourced from EU food labelling law. Offline. One-time purchase. Built for the worst case so it never happens.</p>
        <div class="links">
            <a href="/privacy.html">Privacy Policy</a>
            <a href="/support.html">Support</a>
        </div>
    </div>
    <div class="footer">Built by a solo developer in Malta.</div>
</body>
</html>
